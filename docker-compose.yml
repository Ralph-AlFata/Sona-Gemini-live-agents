# Sona — local Docker Compose
#
# Usage:
#   1. cp .env.example .env   (fill in GOOGLE_CLOUD_PROJECT, GOOGLE_API_KEY, VITE_FIREBASE_API_KEY)
#   2. docker compose up --build
#   3. Open http://localhost:3000
#
# All auth is disabled by default. Services communicate over the internal
# Docker network using service names (session, drawing, orchestrator).
# The frontend is compiled with localhost URLs so the browser can reach
# the backend ports directly.

services:
  session:
    build:
      context: ./services/session
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      # Local dev defaults — override in .env if needed
      USE_FIRESTORE: "false"
      SESSION_AUTH_ENABLED: "false"
      FRONTEND_URL: "http://localhost:3000"
    networks:
      - sona-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  drawing:
    build:
      context: ./services/drawing
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      USE_FIRESTORE: "false"
      DRAWING_AUTH_ENABLED: "false"
      FRONTEND_URL: "http://localhost:3000"
      # Internal Docker network URL — drawing talks to session server-side
      SESSION_SERVICE_URL: "http://session:8003"
    networks:
      - sona-net
    depends_on:
      session:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  orchestrator:
    build:
      context: ./services/orchestrator
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      ORCHESTRATOR_AUTH_ENABLED: "false"
      FRONTEND_URL: "http://localhost:3000"
      # Internal Docker network URLs
      SESSION_SERVICE_URL: "http://session:8003"
      DRAWING_SERVICE_URL: "http://drawing:8002"
    networks:
      - sona-net
    depends_on:
      session:
        condition: service_healthy
      drawing:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-facing URLs — must be localhost, not Docker service names
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_SESSION_HTTP_BASE: "http://localhost:8003"
        VITE_DRAWING_HTTP_BASE: "http://localhost:8002"
        VITE_DRAWING_WS_BASE: "ws://localhost:8002"
        VITE_ORCHESTRATOR_WS_BASE: "ws://localhost:8001"
    ports:
      - "3000:3000"
    networks:
      - sona-net
    depends_on:
      orchestrator:
        condition: service_healthy

networks:
  sona-net:
    driver: bridge
